version: "3.9"

services:
  # --------------------------------------------------------------------------
  # OxenDB — the main database server
  # --------------------------------------------------------------------------
  oxendb:
    build:
      context: .
      dockerfile: Dockerfile
    image: oxendb:latest
    container_name: oxendb
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OXEN_HOST: "0.0.0.0"
      OXEN_PORT: "8080"
      OXEN_DATA_DIR: "/data/oxendb"
      OXEN_LOG_LEVEL: "info"
      # Set OXEN_AUTH_TOKEN to enable bearer-token auth:
      # OXEN_AUTH_TOKEN: "change-me-in-production"
    volumes:
      - oxendb_data:/data/oxendb
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - oxendb_net

  # --------------------------------------------------------------------------
  # Prometheus — metrics collection
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: oxendb_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - oxendb_net
    depends_on:
      - oxendb

  # --------------------------------------------------------------------------
  # Grafana — metrics dashboards
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.3
    container_name: oxendb_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: oxendb-grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - oxendb_net
    depends_on:
      - prometheus

# --------------------------------------------------------------------------
# Named volumes
# --------------------------------------------------------------------------
volumes:
  oxendb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# --------------------------------------------------------------------------
# Network
# --------------------------------------------------------------------------
networks:
  oxendb_net:
    driver: bridge
